name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - dev

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install dependencies
        run: pnpm install

      - name: Run lint
        run: pnpm lint

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/dev'
    env:
      VERCEL_TOKEN: ${{ secrets.STAGING_VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.STAGING_VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.STAGING_VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_API_URL: ${{ vars.STAGING_NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_APP_ENV: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'

      - name: Install pnpm and Vercel CLI
        run: npm install -g pnpm@latest vercel@latest

      - name: Install dependencies
        run: pnpm install

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          echo "url=$url" >> $GITHUB_OUTPUT

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.PRODUCTION_VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.PRODUCTION_VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.PRODUCTION_VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_API_URL: ${{ vars.PRODUCTION_NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_APP_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'

      - name: Install pnpm and Vercel CLI
        run: npm install -g pnpm@latest vercel@latest

      - name: Install dependencies
        run: pnpm install

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "url=$url" >> $GITHUB_OUTPUT
